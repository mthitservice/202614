services:
  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "80"
    depends_on:
      - backend
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "5000"
  proxy:
    image: nginx:latest
    container_name: proxy
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro

